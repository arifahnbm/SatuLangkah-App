steps:
  # Langkah 1: Membangun image Docker dari Dockerfile Anda
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/satulangkah', '.']

  # Langkah 2: Mengunggah image Docker ke Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/satulangkah']

  # Langkah 3: Men-deploy hasil akhir ke Google Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'satulangkah'
      - '--image'
      - 'gcr.io/$PROJECT_ID/satulangkah'
      - '--region'
      - 'asia-southeast2'
      - '--port'
      - '8080' # <- Menegaskan Cloud Run untuk menggunakan port 8080
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY
